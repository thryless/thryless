<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thryless | Account Settings</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #161616;
            --accent: #00ffcc;
            --text-main: #ffffff;
            --text-dim: #888;
        }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .account-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--accent), #0088ff);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }
        .status-badge {
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
        }
        .info-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .info-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { background: #222; padding: 12px; border-radius: 8px; border: 1px solid #444; }
        
        .btn-back {
            display: block;
            margin-top: 30px;
            text-align: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="account-card">
        <div class="profile-header">
            <div class="avatar">G</div>
            <h2>Gustavo</h2>
            <span class="status-badge">Administrator</span>
        </div>

        <div class="info-group">
            <div class="info-label">ID de Usuario</div>
            <div class="info-value">TH-001-ALPHA</div>
        </div>

        <div class="info-group">
            <div class="info-label">Correo Electrónico</div>
            <div class="info-value">thryless@gmail.com</div>
        </div>

        <div class="info-group">
            <div class="info-label">Nivel de Acceso</div>
            <div class="info-value">Total Control - Nivel 5</div>
        </div>

        <a href="https://thryless.com" class="btn-back">← Volver al Hub Central</a>
    </div>

</body>
</html>
